name: 🏛 Deploy PHAROLON to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: 🔍 Validate Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required pages exist
        run: |
          echo "Checking required documentation pages..."
          pages=(
            "docs/index.html"
            "docs/brand.html"
            "docs/ui_spec/UI-SPEC-001_Design_Specification.md"
            "docs/architecture/ADR-017_Brand_Name_PHAROLON.md"
            "docs/business/BIZ-001_Licensing_Strategy.md"
          )
          all_ok=true
          for page in "${pages[@]}"; do
            if [ -f "$page" ]; then
              size=$(wc -c < "$page")
              echo "  ✅ $page (${size} bytes)"
            else
              echo "  ❌ MISSING: $page"
              all_ok=false
            fi
          done
          $all_ok || exit 1

      - name: Check brand integrity
        run: |
          echo "Checking PHAROLON brand integrity..."

          # Confirm brand name is correct everywhere in HTML
          if grep -r "PHARION" docs/*.html 2>/dev/null; then
            echo "❌ Found wrong brand name PHARION in HTML files"
            exit 1
          fi
          echo "  ✅ Brand name PHAROLON consistent"

          # Confirm icon pyramid coordinates locked
          if grep -q "55,14.*11,82.*99,82" docs/index.html; then
            echo "  ✅ Icon coordinates locked (55,14 11,82 99,82)"
          else
            echo "  ⚠️  Icon coordinates not found — verify pyramid geometry"
          fi

          # Confirm pH acronym present
          if grep -q "pH" docs/brand.html; then
            echo "  ✅ pH acronym present in brand page"
          fi

          echo "Brand checks complete"

      - name: Count documentation assets
        run: |
          echo "📊 PHAROLON Documentation Inventory"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "HTML pages:     $(find docs -name '*.html' | wc -l)"
          echo "Markdown docs:  $(find docs -name '*.md' | wc -l)"
          echo "Total files:    $(find docs -type f | wc -l)"
          echo "Docs size:      $(du -sh docs | cut -f1)"

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject build metadata
        run: |
          # Inject commit SHA and build date into pages as HTML meta tags
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "Build: ${SHORT_SHA} at ${BUILD_DATE}"

          for html in docs/*.html; do
            sed -i "s|</head>|<meta name=\"pharolon:build\" content=\"${SHORT_SHA}\"/>\n<meta name=\"pharolon:built-at\" content=\"${BUILD_DATE}\"/>\n</head>|" "$html"
            echo "  Tagged: $html"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "## 🏛 PHAROLON Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${GITHUB_REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pages" >> $GITHUB_STEP_SUMMARY
          echo "- [Landing Page](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Brand Identity](${{ steps.deployment.outputs.page_url }}brand.html)" >> $GITHUB_STEP_SUMMARY
