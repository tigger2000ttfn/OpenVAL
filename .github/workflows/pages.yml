name: 🏛 Deploy PHAROLON to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: 🔍 Validate Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required pages exist
        run: |
          echo "Checking required pages..."
          ok=true
          for page in docs/index.html docs/brand.html docs/platform-preview.html; do
            if [ -f "$page" ]; then
              echo "  ✅ $page ($(wc -c < $page) bytes)"
            else
              echo "  ❌ MISSING: $page"
              ok=false
            fi
          done
          $ok || exit 1

      - name: Brand compliance
        run: |
          wrong=$(grep -ri "pharion" docs/*.html 2>/dev/null | grep -v "ADR-017" | wc -l)
          [ "$wrong" -eq 0 ] && echo "  ✅ Brand name PHAROLON consistent" || { echo "❌ PHARION found $wrong times"; exit 1; }

      - name: Summary
        run: |
          echo "## 📋 Pre-deploy Check" >> $GITHUB_STEP_SUMMARY
          echo "| Page | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in docs/*.html; do
            echo "| $(basename $f) | $(wc -c < $f) bytes |" >> $GITHUB_STEP_SUMMARY
          done

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build metadata
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHORT_SHA="${GITHUB_SHA::7}"
          for html in docs/*.html; do
            sed -i "s|</head>|<meta name=\"pharolon:build\" content=\"${SHORT_SHA}\"/><meta name=\"pharolon:built-at\" content=\"${BUILD_DATE}\"/></head>|" "$html"
          done
          echo "Tagged build ${SHORT_SHA} at ${BUILD_DATE}"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "deploy: ${{ github.sha }}"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Deployment summary
        run: |
          echo "## 🏛 PHAROLON Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://tigger2000ttfn.github.io/OpenVAL/ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Live Pages" >> $GITHUB_STEP_SUMMARY
          echo "- [Landing](https://tigger2000ttfn.github.io/OpenVAL/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Brand](https://tigger2000ttfn.github.io/OpenVAL/brand.html)" >> $GITHUB_STEP_SUMMARY
          echo "- [Platform Preview](https://tigger2000ttfn.github.io/OpenVAL/platform-preview.html)" >> $GITHUB_STEP_SUMMARY
