<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PHAROLON — Brand Identity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#08080E;font-family:'DM Mono',monospace;color:rgba(232,237,242,.65);overflow-x:hidden;}

/* wordmark */
.ch{font-family:'Syne',sans-serif;font-weight:800;letter-spacing:0;line-height:1;background:linear-gradient(180deg,#F5D060 0%,#E2A837 45%,#B8820E 85%,#8A5F08 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ch-p{display:inline-block;transform:translateY(0.14em);}
.wm{display:flex;align-items:baseline;overflow:visible;padding-bottom:16px;}
.wm-dk .ch{background:linear-gradient(180deg,#F5D060,#E2A837 45%,#B8820E 85%,#8A5F08);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* layout */
.page{max-width:960px;margin:0 auto;padding:80px 32px;}
.section{padding:72px 0;border-top:1px solid rgba(226,168,55,.08);}
.sec-label{font-size:9px;letter-spacing:2px;color:rgba(226,168,55,.45);text-transform:uppercase;margin-bottom:40px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;}
.cell{padding:44px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;}
.lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase;align-self:flex-start;}
.lbl-lt{color:rgba(255,255,255,.15);}
.lbl-dk{color:rgba(0,0,0,.2);}
.lk-h{display:flex;align-items:center;gap:18px;overflow:visible;padding-bottom:14px;}
.sep-dk{width:1px;height:52px;background:rgba(226,168,55,.1);}
.sep-lt{width:1px;height:52px;background:rgba(120,90,10,.2);}
.bg-ink  {background:#08080E;}
.bg-dark {background:#0D0D18;}
.bg-teal {background:#002A25;}
.bg-mid  {background:#c1c1c1;}
.bg-white{background:#ffffff;}

/* icon aura */
.icon-hero{position:relative;display:flex;align-items:center;justify-content:center;}
.icon-hero::before{content:'';position:absolute;width:220px;height:220px;background:radial-gradient(circle,rgba(226,168,55,.09),transparent 60%);border-radius:50%;animation:aura 4s ease-in-out infinite;}
@keyframes aura{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.12);}}

/* animations */
@keyframes draw-ghost{0%{stroke-dashoffset:268;opacity:0;}12%{opacity:.16;}72%{opacity:.1;stroke-dashoffset:0;}88%{opacity:0;stroke-dashoffset:0;}100%{stroke-dashoffset:268;opacity:0;}}
.ghost{stroke-dasharray:268;stroke-dashoffset:268;animation:draw-ghost 11s ease-in-out infinite;}
@keyframes lh-flash{0%{opacity:.45;}8%{opacity:1;}18%{opacity:.3;}28%{opacity:1;}38%{opacity:.3;}48%{opacity:1;}62%{opacity:.25;}100%{opacity:.45;}}
@keyframes lh-halo{0%,100%{opacity:.07;}8%,28%,48%{opacity:.22;}18%,38%{opacity:.04;}}
.lh-core{animation:lh-flash 4.5s ease-in-out infinite;}
.lh-halo{animation:lh-halo  4.5s ease-in-out infinite;}
@keyframes compass{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.compass-ring{transform-origin:55px 55px;animation:compass 100s linear infinite;}
@keyframes sweep{0%{transform:rotate(-35deg);opacity:0;}8%{opacity:.5;}55%{transform:rotate(35deg);opacity:.18;}65%{opacity:0;}100%{transform:rotate(-35deg);opacity:0;}}
.sweep{transform-origin:55px 14px;animation:sweep 9s ease-in-out infinite;}
@keyframes fan-pulse{0%,100%{opacity:.06;}40%{opacity:.14;}}
.fan-ray{animation:fan-pulse 7s ease-in-out infinite;}
.fan-ray:nth-child(2){animation-delay:-1.4s;}
.fan-ray:nth-child(3){animation-delay:-2.8s;}
.fan-ray:nth-child(4){animation-delay:-4.2s;}
.fan-ray:nth-child(5){animation-delay:-5.6s;}

/* pull quote */
.pull{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(26px,4.5vw,48px);line-height:1.2;color:rgba(240,192,64,.9);letter-spacing:-.3px;margin-bottom:24px;}
.rule{width:32px;height:1px;background:rgba(226,168,55,.3);margin:28px 0;}
.body{font-family:'Inter',sans-serif;font-size:14px;color:rgba(232,237,242,.6);line-height:1.85;}
.body strong{color:rgba(226,168,55,.55);font-weight:400;}

/* meaning cards */
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:40px;}
.mc{background:#0D0D18;border:1px solid #1A1A2A;padding:26px;}
.mc-title{font-family:'Inter',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.2px;margin-bottom:8px;}
.mc-gold{color:rgba(226,168,55,.7);}
.mc-body{font-family:'Inter',sans-serif;font-size:13px;color:rgba(232,237,242,.55);line-height:1.7;}
.mc-body strong{color:rgba(226,168,55,.5);font-weight:400;}

/* pH display */
.ph-display,.ph-display span{font-family:'Syne',sans-serif;font-weight:800;font-size:96px;letter-spacing:-.02em;line-height:1;}
.ph-display{display:flex;align-items:baseline;gap:0;}
.ph-p{font-family:'Syne',sans-serif;font-weight:800;font-style:normal;display:inline-block;background:linear-gradient(180deg,#F5D060,#E2A837 45%,#B8820E 85%,#8A5F08);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ph-h{font-family:'Syne',sans-serif;font-weight:800;font-style:normal;background:linear-gradient(180deg,#F5D060,#E2A837 45%,#B8820E 85%,#8A5F08);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* palette */
.pal-row{display:flex;gap:3px;margin-bottom:3px;}
.sw{flex:1;height:64px;border-radius:3px;display:flex;flex-direction:column;justify-content:flex-end;padding:5px 7px;}
.sw-n{font-size:8px;font-weight:500;}
.sw-h{font-size:7px;opacity:.5;}

/* app icons */
.icon-row{display:flex;align-items:flex-end;justify-content:center;gap:24px;flex-wrap:wrap;}
.ico-item{display:flex;flex-direction:column;align-items:center;gap:10px;}
.ico-sz{font-size:8px;color:rgba(226,168,55,.2);}
.app-ico{border-radius:22%;background:linear-gradient(145deg,#130E01,#060401);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(226,168,55,.1);}

footer{padding:64px 32px;text-align:center;border-top:1px solid rgba(226,168,55,.06);}
.ft{font-family:'Syne',sans-serif;font-weight:800;font-size:48px;letter-spacing:0;background:linear-gradient(180deg,rgba(240,192,64,.15),rgba(168,126,20,.08));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;}
.ft-sub{font-size:8px;color:rgba(226,168,55,.15);letter-spacing:2px;text-transform:uppercase;line-height:2.2;}

}

@keyframes lh-flash{0%{opacity:.4;}8%{opacity:1;}18%{opacity:.25;}28%{opacity:1;}38%{opacity:.25;}48%{opacity:1;}65%{opacity:.25;}100%{opacity:.4;}}
@keyframes lh-halo{0%,100%{opacity:.06;}8%,28%,48%{opacity:.24;}18%,38%{opacity:.03;}}
@keyframes compass-rot{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes ghost-draw{0%{stroke-dashoffset:268;opacity:0;}12%{opacity:.15;}72%{opacity:.08;stroke-dashoffset:0;}88%{opacity:0;stroke-dashoffset:0;}100%{stroke-dashoffset:268;opacity:0;}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;background:rgba(8,8,14,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,160,144,.15);display:flex;align-items:center;padding:0 24px;gap:10px;}
.nav-wm{line-height:1;}
.nav-sp{flex:1;}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-a{font-size:9px;letter-spacing:.5px;color:rgba(0,212,196,.55);text-decoration:none;text-transform:uppercase;transition:color .15s;}
.nav-a:hover{color:#5EEADF;}
.nav-gh{font-size:9px;letter-spacing:.5px;color:#00D4C4;border:1px solid rgba(0,160,144,.35);border-radius:3px;padding:5px 14px;text-decoration:none;}

.icon-box{width:200px;height:200px;background:linear-gradient(145deg,#1C1C1C,#0A0A0A);border-radius:44px;display:flex;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08);position:relative;margin:0 auto 32px;}
.icon-box::before{content:'';position:absolute;inset:0;border-radius:44px;background:linear-gradient(145deg,rgba(255,255,255,.04),transparent 60%);pointer-events:none;}
.wm-shadow{filter:drop-shadow(0 1px 4px rgba(0,0,0,.3));}

/* pH Acronym Display — fresh class */


50%{opacity:.25;}}
100%{left:calc(100% + 80px);}}
to{transform:rotate(360deg);}}
50%{opacity:.9;box-shadow:0 0 12px 5px rgba(167,139,250,.5);}}

/* ── MOBILE NAV (≤768px) ── */
.nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:8px;margin-right:-4px;background:none;border:none;z-index:110;min-width:44px;min-height:44px;align-items:center;}
.nav-burger span{display:block;width:22px;height:2px;background:rgba(0,212,196,.7);border-radius:2px;transition:transform .25s,opacity .25s;transform-origin:center;}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-burger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.nav-drawer{position:fixed;top:50px;left:0;right:0;background:rgba(8,8,14,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,160,144,.2);max-height:0;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1);z-index:99;}
.nav-drawer.open{max-height:340px;}
.nav-drawer-inner{padding:8px 0 20px;}
.nav-drawer a{display:flex;align-items:center;padding:14px 28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,212,196,.55);text-decoration:none;border-left:2px solid transparent;transition:all .15s;min-height:44px;}
.nav-drawer a:hover,.nav-drawer a.active{color:#00D4C4;border-left-color:#00D4C4;background:rgba(0,160,144,.06);}
.nav-drawer .drawer-gh{margin:8px 24px 0;display:flex;align-items:center;justify-content:center;padding:12px;border:1px solid rgba(0,160,144,.3);border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:#00D4C4;text-decoration:none;min-height:44px;}
@media(max-width:768px){.nav-links{display:none!important;}.nav-gh{display:none!important;}.nav-burger{display:flex!important;}}
@media(max-width:768px){.grid2,.grid3,.mc-grid{grid-template-columns:1fr;}.hero{padding:90px 20px 60px;}#ph-box{width:230px!important;height:230px!important;}}
<script>
(function(){
  var b=document.querySelector('.nav-burger');
  var d=document.querySelector('.nav-drawer');
  if(!b||!d)return;
  b.addEventListener('click',function(e){e.stopPropagation();var o=b.classList.toggle('open');d.classList.toggle('open',o);});
  d.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){b.classList.remove('open');d.classList.remove('open');});});
  document.addEventListener('click',function(e){if(!b.contains(e.target)&&!d.contains(e.target)){b.classList.remove('open');d.classList.remove('open');}});
})();
</script>
</body>
</html>
