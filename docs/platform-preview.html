<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PHAROLON — Platform Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --t950:#002A25;--t900:#004D45;--t700:#008577;--t600:#00A090;--t500:#00B8A9;--t400:#00D4C4;--t300:#5EEADF;
  --g300:#F7D56E;--g400:#F0C040;--g500:#E2A837;--g600:#C9981A;--g700:#A87E14;--g800:#7A5A0A;
  --or:#F97316;--pass:#86C140;--fail:#E54B2E;--pur:#8B5CF6;--info:#3B82F6;
  --ch:#141414;--ch2:#1E1E1E;--ch3:#2A2A2A;
  --dk:#0C1117;--dks:#161D26;--dks2:#1E2837;
  --text:#E8EDF2;--text2:rgba(232,237,242,.65);--text3:rgba(232,237,242,.38);
  --inp:#243040;--inpbrd:#2E4055;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dk);font-family:'Inter',system-ui,sans-serif;color:var(--text);line-height:1.6;overflow-x:hidden;}

/* ── HERO ── */
.hero{min-height:100vh;background:linear-gradient(160deg,#002A25 0%,#0C1117 45%,#0C1117 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:110px 24px 80px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g500),transparent);}
.hero-bg-glow{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(226,168,55,.06) 0%,transparent 70%);pointer-events:none;}
.hero-badge{background:rgba(226,168,55,.1);border:1px solid rgba(226,168,55,.3);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--g400);letter-spacing:.5px;display:inline-block;margin-bottom:20px;}
.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,10vw,110px);letter-spacing:0;margin-bottom:10px;}
.hero-sub{font-size:clamp(14px,2vw,17px);color:rgba(232,237,242,.55);max-width:580px;margin:0 auto 12px;font-family:'DM Mono',monospace;}
.hero-tagline{font-size:9px;letter-spacing:2px;color:rgba(226,168,55,.2);text-transform:uppercase;margin-bottom:40px;font-family:'DM Mono',monospace;}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-hero{padding:14px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,var(--g500),var(--g700));color:#08080E;border:none;}
.btn-primary:hover{background:linear-gradient(135deg,var(--g400),var(--g600));transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--g400);border:1px solid rgba(226,168,55,.35);}
.btn-ghost:hover{background:rgba(226,168,55,.08);}
.hero-stats{display:flex;gap:40px;justify-content:center;margin-top:56px;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-num{font-size:28px;font-weight:700;color:#fff;}
.stat-num span{color:var(--g400);}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.4px;text-transform:uppercase;}

/* ── SHARED SECTION ── */
.section{padding:80px 24px;max-width:1100px;margin:0 auto;}
.section-eyebrow{font-size:11px;color:var(--g600);letter-spacing:1px;text-transform:uppercase;text-align:center;margin-bottom:10px;}
.section-title{font-size:clamp(24px,4vw,40px);font-weight:700;text-align:center;letter-spacing:-.5px;margin-bottom:8px;}
.section-sub{font-size:15px;color:var(--text2);text-align:center;margin-bottom:48px;max-width:540px;margin-left:auto;margin-right:auto;}

/* ── APP CHROME ── */
.app-wrap{background:var(--ch);border-radius:12px;overflow:hidden;border:1px solid var(--ch3);box-shadow:0 40px 120px rgba(0,0,0,.6);margin-bottom:12px;}
.app-bar{background:#0A0A0A;height:32px;display:flex;align-items:center;padding:0 14px;gap:8px;}
.dot{width:10px;height:10px;border-radius:50%;}
.app-hdr{background:#0D1410;height:58px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--ch3);}
.ph-logo{width:44px;height:44px;flex-shrink:0;overflow:visible;}
.ph-wm{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:0;display:flex;align-items:baseline;padding-bottom:2px;}
.ph-p{background:linear-gradient(180deg,#F5D060,#E2A837 45%,#A87E14);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ph-h{background:linear-gradient(180deg,#F5D060,#E2A837 45%,#A87E14);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.site-chip{background:rgba(226,168,55,.1);border:1px solid rgba(226,168,55,.25);color:var(--g600);font-size:10px;padding:3px 9px;border-radius:20px;}
.hdr-sp{flex:1;}
.notif-btn{width:30px;height:30px;border-radius:6px;background:rgba(226,168,55,.1);border:1px solid rgba(226,168,55,.25);display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;}
.notif-b{position:absolute;top:2px;right:2px;width:12px;height:12px;background:var(--g500);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#08080E;}
.frame-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--t600),var(--t900));border:2px solid var(--t600);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.app-body{display:flex;height:320px;}
.sidebar{background:#002A25;width:180px;flex-shrink:0;padding:6px 0;border-right:1px solid rgba(0,160,144,.2);}
.nav-grp{font-size:7px;color:rgba(255,255,255,.2);letter-spacing:1px;text-transform:uppercase;padding:10px 12px 3px;font-family:'JetBrains Mono',monospace;}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:10px;color:rgba(255,255,255,.45);cursor:pointer;}
.nav-item.active{background:rgba(0,212,196,.12);color:#fff;border-right:2px solid var(--t400);}
.nav-item.active .nav-ic{color:var(--g500);}
.nav-ic{font-size:11px;width:14px;}
.nav-badge{margin-left:auto;background:var(--g700);color:#fff;font-size:6px;font-weight:700;padding:1px 4px;border-radius:3px;}
.content{flex:1;background:#0D1117;padding:14px;overflow:hidden;}
.view-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:2px;}
.view-sub{font-size:10px;color:var(--text3);margin-bottom:12px;font-family:'JetBrains Mono',monospace;}

/* ── STATUS BADGES ── */
.sp{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.sp-pass{background:rgba(134,193,64,.12);color:var(--pass);}
.sp-fail{background:rgba(229,75,46,.12);color:var(--fail);}
.sp-rev{background:rgba(0,160,144,.1);color:var(--t400);}
.sp-gold{background:rgba(226,168,55,.1);color:var(--g400);}
.sp-pur{background:rgba(139,92,246,.12);color:var(--pur);}
.sp-grey{background:rgba(232,237,242,.06);color:var(--text3);}

/* ── PROTOCOL EXECUTION VIEW ── */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.kc{background:var(--dks);border:1px solid var(--ch3);border-radius:6px;padding:9px 11px;}
.kc-gold{border-color:rgba(226,168,55,.2);}
.kl{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;font-family:'JetBrains Mono',monospace;}
.kl-gold{color:rgba(226,168,55,.4);}
.kv{font-size:18px;font-weight:700;color:#fff;}
.tbl{background:var(--dks);border:1px solid var(--ch3);border-radius:6px;overflow:hidden;}
.tbl-hdr{display:grid;grid-template-columns:58px 1fr 80px 54px;padding:5px 10px;background:var(--ch3);font-size:7px;color:var(--text3);letter-spacing:.3px;text-transform:uppercase;gap:8px;font-family:'JetBrains Mono',monospace;}
.tbl-row{display:grid;grid-template-columns:58px 1fr 80px 54px;padding:7px 10px;gap:8px;font-size:9px;color:var(--text2);border-top:1px solid var(--ch3);align-items:center;}
.tbl-ref{color:var(--g600);font-family:'JetBrains Mono',monospace;font-size:8px;}

/* ── RTM HEAT MAP VIEW ── */
.rtm-wrap{overflow:hidden;}
.rtm-grid{display:grid;gap:2px;margin-bottom:6px;}
.rtm-cell{height:18px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;}
.rtm-pass{background:rgba(134,193,64,.25);color:var(--pass);}
.rtm-fail{background:rgba(229,75,46,.2);color:var(--fail);}
.rtm-pend{background:rgba(226,168,55,.12);color:var(--g400);}
.rtm-na{background:rgba(232,237,242,.04);color:transparent;}
.rtm-label{font-size:7px;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rtm-col-hdr{font-size:6px;color:var(--text3);font-family:'JetBrains Mono',monospace;transform:rotate(-35deg);transform-origin:bottom left;white-space:nowrap;height:36px;display:flex;align-items:flex-end;}
.rtm-coverage-bar{background:var(--ch3);border-radius:3px;height:5px;margin-top:8px;}
.rtm-coverage-fill{background:linear-gradient(90deg,var(--pass),var(--g500));border-radius:3px;height:5px;}

/* ── CAPA VIEW ── */
.capa-table{width:100%;border-collapse:separate;border-spacing:0;}
.capa-hdr{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;padding:5px 8px;text-align:left;border-bottom:1px solid var(--ch3);font-family:'JetBrains Mono',monospace;}
.capa-row td{font-size:9px;padding:7px 8px;border-bottom:1px solid rgba(232,237,242,.04);color:var(--text2);vertical-align:middle;}
.capa-row:hover td{background:rgba(226,168,55,.03);}
.capa-id{color:var(--g600);font-family:'JetBrains Mono',monospace;font-size:8px;white-space:nowrap;}
.capa-priority{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;}
.overdue-tag{font-size:7px;color:var(--fail);margin-left:4px;}

/* ── SOP VISUALIZER VIEW ── */
.swim-wrap{display:flex;flex-direction:column;gap:2px;padding:8px 0;}
.swim-lane{display:flex;align-items:stretch;min-height:52px;}
.swim-label{width:54px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);color:var(--text3);background:rgba(232,237,242,.03);border-right:1px solid var(--ch3);border-radius:3px 0 0 3px;}
.swim-label-qa{color:var(--g600);}
.swim-label-it{color:var(--t400);}
.swim-label-biz{color:var(--pur);}
.swim-nodes{flex:1;display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(232,237,242,.02);border-radius:0 3px 3px 0;position:relative;}
.sop-node{background:var(--dks);border:1px solid var(--ch3);border-radius:5px;padding:5px 8px;font-size:8px;color:var(--text2);white-space:nowrap;position:relative;}
.sop-node-gold{border-color:rgba(226,168,55,.3);color:var(--g400);}
.sop-node-teal{border-color:rgba(0,160,144,.25);color:var(--t400);}
.sop-node-pur{border-color:rgba(139,92,246,.25);color:var(--pur);}
.sop-arrow{color:var(--text3);font-size:10px;flex-shrink:0;}
.sop-decision{background:var(--dks);border:1px solid rgba(226,168,55,.3);border-radius:3px;transform:rotate(45deg);width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sop-decision span{transform:rotate(-45deg);font-size:7px;color:var(--g400);}

/* ── DASHBOARD VIEW ── */
.dash-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px;}
.dash-kpi{background:var(--dks);border:1px solid var(--ch3);border-radius:6px;padding:9px 10px;}
.dash-kpi-gold{border-color:rgba(226,168,55,.2);}
.dk-label{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;font-family:'JetBrains Mono',monospace;}
.dk-val{font-size:20px;font-weight:700;color:#fff;line-height:1;}
.dk-delta{font-size:8px;margin-top:2px;}
.dk-up{color:var(--pass);}
.dk-down{color:var(--fail);}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dash-card{background:var(--dks);border:1px solid var(--ch3);border-radius:6px;padding:10px;}
.dash-card-title{font-size:9px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px;}
.activity-item{display:flex;align-items:flex-start;gap:7px;padding:4px 0;border-bottom:1px solid rgba(232,237,242,.04);}
.activity-item:last-child{border-bottom:none;}
.act-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.act-text{font-size:9px;color:var(--text2);line-height:1.4;}
.act-time{font-size:8px;color:var(--text3);margin-left:auto;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
/* sparkline bars */
.sparkline{display:flex;align-items:flex-end;gap:2px;height:40px;margin-top:4px;}
.spark-bar{flex:1;border-radius:2px 2px 0 0;min-height:4px;}

/* ── VIEW TAB STRIP ── */
.view-tabs{display:flex;gap:2px;margin-bottom:16px;background:rgba(232,237,242,.04);border-radius:8px;padding:3px;}
.view-tab{flex:1;text-align:center;padding:7px 8px;border-radius:6px;font-size:10px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;}
.view-tab.active{background:rgba(226,168,55,.12);color:var(--g400);border:1px solid rgba(226,168,55,.2);}


/* ── PALETTE SECTION ── */
.palette-section{padding:72px 24px;background:var(--t950);border-top:1px solid rgba(0,160,144,.2);}
.palette-inner{max-width:1100px;margin:0 auto;}
.sw-row{display:flex;gap:4px;margin-bottom:4px;}
.sw{flex:1;height:56px;border-radius:6px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;transition:transform .15s;}
.sw:hover{transform:translateY(-3px);}
.sw-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.75);}
.sw-hex{font-size:7px;color:rgba(255,255,255,.4);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.sw-main{outline:2px solid rgba(255,255,255,.5);outline-offset:3px;}
.accent-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.accent-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:9px 14px;}
.ac-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;}
.ac-name{font-size:11px;font-weight:600;}
.ac-use{font-size:9px;color:rgba(232,237,242,.4);margin-left:4px;}

/* ── OLD PALETTE (unused) ── */
.pal-section{padding:72px 24px;max-width:1100px;margin:0 auto;border-top:1px solid var(--ch3);}
.pal-row{display:flex;gap:4px;margin-bottom:4px;}
.swatch{flex:1;height:52px;border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;padding:5px 7px;}
.sw-n{font-size:8px;font-weight:600;}
.sw-h{font-size:7px;opacity:.5;font-family:'JetBrains Mono',monospace;}
.sw-star{outline:2px solid rgba(255,255,255,.4);outline-offset:2px;}

/* ── FEATURES ── */
.feat-section{padding:72px 24px;border-top:1px solid var(--ch3);}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:1100px;margin:0 auto;}
.feat-card{background:var(--dks);border:1px solid var(--ch3);border-radius:10px;padding:24px;position:relative;overflow:hidden;}
.feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--g600),var(--g400));}
.feat-icon{font-size:24px;margin-bottom:12px;}
.feat-title{font-size:15px;font-weight:600;margin-bottom:8px;}
.feat-desc{font-size:13px;color:var(--text2);line-height:1.6;}
.feat-tag{display:inline-block;margin-top:10px;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:rgba(226,168,55,.1);color:var(--g400);}
.feat-tag-ee{background:rgba(139,92,246,.12);color:var(--pur);}

/* ── COMPONENTS ── */
.comp-section{padding:72px 24px;border-top:1px solid var(--ch3);}
.comp-inner{max-width:1100px;margin:0 auto;}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.comp-card{background:var(--dks);border:1px solid var(--ch3);border-radius:10px;padding:20px;}
.comp-label{font-size:10px;color:var(--g600);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid;}
.sig-block{background:var(--dks2);border:1px solid var(--ch3);border-radius:6px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.sig-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.sig-name{font-size:11px;font-weight:600;}
.sig-role{font-size:9px;color:var(--text3);}
.sig-check{margin-left:auto;font-size:14px;}
.rtm-mini{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;}
.rtm-mini-cell{height:16px;border-radius:2px;}

/* ── COMPLIANCE ── */
.comp-table-section{padding:72px 24px;border-top:1px solid var(--ch3);}
.comp-table-inner{max-width:1100px;margin:0 auto;}
.reg-table{width:100%;border-collapse:collapse;}
.reg-table th{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;padding:8px 12px;border-bottom:1px solid var(--ch3);text-align:left;}
.reg-table td{font-size:11px;padding:9px 12px;border-bottom:1px solid rgba(232,237,242,.05);color:var(--text2);}
.reg-table tr:hover td{background:rgba(226,168,55,.03);}
.ck{color:var(--pass);}
.cx{color:var(--ch3);}

/* ── SCHEMA ── */
.schema-section{padding:72px 24px;border-top:1px solid var(--ch3);}
.schema-inner{max-width:1100px;margin:0 auto;}
.schema-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.schema-row{display:flex;align-items:center;gap:10px;background:var(--dks);border:1px solid var(--ch3);border-radius:6px;padding:10px 12px;}
.schema-part{font-size:10px;font-weight:700;color:var(--g500);font-family:'JetBrains Mono',monospace;width:64px;flex-shrink:0;}
.schema-name{font-size:10px;color:var(--text2);flex:1;}
.schema-count{font-size:10px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;}

/* ── CTA ── */
.cta-section{padding:80px 24px;text-align:center;border-top:1px solid var(--ch3);}
.cta-title{font-size:clamp(24px,4vw,44px);font-weight:700;letter-spacing:-.5px;margin-bottom:16px;}
.cta-sub{font-size:15px;color:var(--text2);margin-bottom:32px;}
.cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

/* ── FOOTER ── */
footer{padding:40px 24px;text-align:center;border-top:1px solid var(--ch3);}
.footer-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:12px;}
footer p{font-size:12px;color:var(--text3);}
footer a{color:var(--g600);text-decoration:none;}


  .sidebar{display:none;}
  .kgrid{grid-template-columns:1fr 1fr;}
  .hero-stats{gap:24px;}
  .feat-grid{grid-template-columns:1fr;}
  .comp-grid{grid-template-columns:1fr;}
  .schema-grid{grid-template-columns:1fr 1fr;}
  .dash-kpis{grid-template-columns:repeat(3,1fr);}
}

/* PHAROLON icon animations */
@keyframes lh-flash{0%{opacity:.4;}8%{opacity:1;}18%{opacity:.25;}28%{opacity:1;}38%{opacity:.25;}48%{opacity:1;}65%{opacity:.25;}100%{opacity:.4;}}
@keyframes lh-halo{0%,100%{opacity:.06;}8%,28%,48%{opacity:.24;}18%,38%{opacity:.03;}}
@keyframes compass-rot{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes ghost-draw{0%{stroke-dashoffset:268;opacity:0;}12%{opacity:.14;}72%{opacity:.08;stroke-dashoffset:0;}88%{opacity:0;stroke-dashoffset:0;}100%{stroke-dashoffset:268;opacity:0;}}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;background:rgba(8,8,14,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,160,144,.15);display:flex;align-items:center;padding:0 24px;gap:10px;}
.nav-wm{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:0;background:linear-gradient(135deg,#F0C040,#C9981A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-sp{flex:1;}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-a{font-size:9px;letter-spacing:.5px;color:rgba(0,212,196,.55);text-decoration:none;text-transform:uppercase;transition:color .15s;}
.nav-a:hover{color:var(--t300,#5EEADF);}
.nav-a.active{color:var(--t400,#00D4C4);}
.nav-gh{font-size:9px;letter-spacing:.5px;color:var(--t400,#00D4C4);border:1px solid rgba(0,160,144,.35);border-radius:3px;padding:5px 14px;text-decoration:none;transition:all .15s;}
.nav-gh:hover{background:rgba(0,160,144,.08);}
.wm-shadow{filter:drop-shadow(0 1px 4px rgba(0,0,0,.3));}

/* ── MOBILE NAV (≤768px) ── */
.nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:8px;margin-right:-4px;background:none;border:none;z-index:110;min-width:44px;min-height:44px;align-items:center;}
.nav-burger span{display:block;width:22px;height:2px;background:rgba(0,212,196,.7);border-radius:2px;transition:transform .25s,opacity .25s;transform-origin:center;}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-burger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.nav-drawer{position:fixed;top:50px;left:0;right:0;background:rgba(8,8,14,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,160,144,.2);max-height:0;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1);z-index:99;}
.nav-drawer.open{max-height:340px;}
.nav-drawer-inner{padding:8px 0 20px;}
.nav-drawer a{display:flex;align-items:center;padding:14px 28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,212,196,.55);text-decoration:none;border-left:2px solid transparent;transition:all .15s;min-height:44px;}
.nav-drawer a:hover,.nav-drawer a.active{color:#00D4C4;border-left-color:#00D4C4;background:rgba(0,160,144,.06);}
.nav-drawer .drawer-gh{margin:8px 24px 0;display:flex;align-items:center;justify-content:center;padding:12px;border:1px solid rgba(0,160,144,.3);border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:#00D4C4;text-decoration:none;min-height:44px;}
@media(max-width:768px){.nav-links{display:none!important;}.nav-gh{display:none!important;}.nav-burger{display:flex!important;}}
@media(max-width:768px){.sidebar{display:none;}.app-body{height:auto;}.kgrid{grid-template-columns:1fr 1fr;}.feat-grid{grid-template-columns:1fr;}.schema-grid{grid-template-columns:1fr 1fr;}.hero{padding:90px 20px 60px;}.hero-stats{gap:20px;}}
<script>
(function(){
  var b=document.querySelector('.nav-burger');
  var d=document.querySelector('.nav-drawer');
  if(!b||!d)return;
  b.addEventListener('click',function(e){e.stopPropagation();var o=b.classList.toggle('open');d.classList.toggle('open',o);});
  d.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){b.classList.remove('open');d.classList.remove('open');});});
  document.addEventListener('click',function(e){if(!b.contains(e.target)&&!d.contains(e.target)){b.classList.remove('open');d.classList.remove('open');}});
})();
</script>
</body>
</html>
