<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PHAROLON — Quality Intelligence for Regulated Industries</title>
<meta name="description" content="The open-source quality intelligence platform for pharmaceutical, medical device, biotech, food safety, aerospace and clinical research. Free self-hosted alternative to Kneat and ValGenesis."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g300:#F7D56E;--g400:#F0C040;--g500:#E2A837;--g600:#C9981A;--g700:#A87E14;--g800:#7A5A0A;
  --t950:#002A25;--t900:#004D45;--t600:#00A090;--t400:#00D4C4;
  --pass:#86C140;--fail:#E54B2E;--pur:#8B5CF6;
  --ink:#08080E;--ink2:#0D0D18;--ink3:#131320;--ink4:#1A1A2A;
  --fog:rgba(226,168,55,.18);
}
html{scroll-behavior:smooth;}
body{background:var(--ink);font-family:'DM Mono',monospace;color:rgba(232,237,242,.7);overflow-x:hidden;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;background:rgba(8,8,14,.9);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,160,144,.15);display:flex;align-items:center;padding:0 28px;gap:8px;}
.nav-wm{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:0;background:linear-gradient(135deg,var(--g400),var(--g600));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-sp{flex:1;}
.nav-links{display:flex;gap:24px;}
.nav-a{font-size:9px;letter-spacing:.5px;color:rgba(0,212,196,.55);text-decoration:none;text-transform:uppercase;transition:color .15s;}
.nav-a:hover{color:var(--t300);}
.nav-gh{font-size:9px;letter-spacing:.5px;color:var(--t400);border:1px solid rgba(0,160,144,.35);border-radius:3px;padding:5px 14px;text-decoration:none;transition:all .15s;}
.nav-gh:hover{background:rgba(201,152,26,.07);}

/* ── GLOBAL SVG DEFS ── */
/* rendered inline below body open */

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 28px 80px;position:relative;overflow:hidden;}
.hero-ambient{position:absolute;bottom:-80px;left:50%;transform:translateX(-50%);width:700px;height:320px;background:radial-gradient(ellipse at 50% 100%,rgba(226,168,55,.06),transparent 65%);border-radius:50%;filter:blur(10px);pointer-events:none;}

/* icon wrap — rays live INSIDE the SVG so they align to the apex */
.hero-icon{position:relative;z-index:1;margin-bottom:22px;}

.hor{width:180px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,160,144,.4),transparent);margin:0 auto 22px;}
.kicker{font-size:9px;letter-spacing:2px;color:rgba(0,212,196,.5);text-transform:uppercase;margin-bottom:18px;}

/* WORDMARK — letter-spacing:0, no stretch */
.wm{display:flex;align-items:baseline;overflow:visible;padding-bottom:16px;}
.ch{font-family:'Syne',sans-serif;font-weight:800;letter-spacing:0;line-height:1;background:linear-gradient(180deg,#F5D060 0%,#E2A837 45%,#B8820E 85%,#8A5F08 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ch-p{display:inline-block;transform:translateY(0.14em);}
.wm-dk .ch{background:linear-gradient(180deg,#F5D060,#E2A837 45%,#B8820E 85%,#8A5F08);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.tagline{font-size:9px;letter-spacing:2px;color:rgba(0,212,196,.4);text-transform:uppercase;margin-bottom:40px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:48px;}
.chip{font-size:8px;letter-spacing:1px;color:rgba(0,212,196,.5);border:1px solid rgba(0,160,144,.22);border-radius:2px;padding:4px 10px;text-transform:uppercase;}
.ctas{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn-p{font-family:'Inter',sans-serif;font-weight:700;font-size:11px;letter-spacing:.1px;color:#08080E;background:linear-gradient(135deg,var(--g400),var(--g600));border-radius:3px;padding:11px 26px;text-decoration:none;}
.btn-s{font-family:'Inter',sans-serif;font-weight:600;font-size:11px;letter-spacing:.2px;color:var(--t400);border:1px solid rgba(0,160,144,.35);border-radius:3px;padding:11px 26px;text-decoration:none;}

/* ── ANIMATIONS ── */
/* Ghost pyramid — draws itself in transparently */
@keyframes draw-ghost{0%{stroke-dashoffset:268;opacity:0;}12%{opacity:.16;}72%{opacity:.1;stroke-dashoffset:0;}88%{opacity:0;stroke-dashoffset:0;}100%{stroke-dashoffset:268;opacity:0;}}
.ghost{stroke-dasharray:268;stroke-dashoffset:268;animation:draw-ghost 11s ease-in-out infinite;}

/* Lighthouse triple-flash */
@keyframes lh-flash{0%{opacity:.45;}8%{opacity:1;}18%{opacity:.3;}28%{opacity:1;}38%{opacity:.3;}48%{opacity:1;}62%{opacity:.25;}100%{opacity:.45;}}
@keyframes lh-halo{0%,100%{opacity:.07;}8%,28%,48%{opacity:.22;}18%,38%{opacity:.04;}}
.lh-core{animation:lh-flash 4.5s ease-in-out infinite;}
.lh-halo{animation:lh-halo 4.5s ease-in-out infinite;}

/* Compass slow rotation */
@keyframes compass{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.compass-ring{transform-origin:55px 55px;animation:compass 100s linear infinite;}

/* Sweep ray — rotates around apex (55,14) */
@keyframes sweep{0%{transform:rotate(-35deg);opacity:0;}8%{opacity:.5;}55%{transform:rotate(35deg);opacity:.18;}65%{opacity:0;}100%{transform:rotate(-35deg);opacity:0;}}
.sweep{transform-origin:55px 14px;animation:sweep 9s ease-in-out infinite;}

/* Fan rays — subtle static glow lines from apex, pulse together */
@keyframes fan-pulse{0%,100%{opacity:.06;}40%{opacity:.14;}50%{opacity:.1;}}
.fan-ray{animation:fan-pulse 7s ease-in-out infinite;}
.fan-ray:nth-child(2){animation-delay:-1.4s;}
.fan-ray:nth-child(3){animation-delay:-2.8s;}
.fan-ray:nth-child(4){animation-delay:-4.2s;}
.fan-ray:nth-child(5){animation-delay:-5.6s;}

/* ── SECTION DISPLAY HEADS ── */
.section-heading{font-family:'Inter',sans-serif;font-weight:700;font-size:clamp(18px,3vw,30px);letter-spacing:-.3px;line-height:1.2;margin-bottom:16px;}

/* ── STORY SECTION ── */
.section{padding:96px 28px;border-top:1px solid var(--ink4);}
.inner{max-width:820px;margin:0 auto;}
.sec-label{font-size:9px;letter-spacing:2px;color:rgba(0,212,196,.6);text-transform:uppercase;margin-bottom:48px;}
.story-pull{font-family:'Inter',sans-serif;font-weight:700;font-size:clamp(20px,3.2vw,36px);letter-spacing:-.3px;line-height:1.35;color:rgba(255,255,255,.88);margin-bottom:28px;}
.story-gold{background:linear-gradient(135deg,#F5D060,#C9981A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;}
.rule{width:32px;height:1px;background:var(--t600);opacity:.5;margin:32px 0;}
.body-text{font-family:'Inter',sans-serif;font-size:14px;color:rgba(232,237,242,.62);line-height:1.85;}
.body-text strong{color:rgba(226,168,55,.65);font-weight:400;}

/* Hidden meaning grid */
.meaning-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:40px;}
.meaning-card{background:var(--ink2);border:1px solid var(--ink4);padding:28px;border-radius:2px;}
.mc-icon{font-size:20px;margin-bottom:12px;}
.mc-title{font-family:'Inter',sans-serif;font-size:14px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:-.2px;}
.mc-gold{color:var(--g500) !important;}
.mc-body{font-family:'Inter',sans-serif;font-size:13px;color:rgba(232,237,242,.52);line-height:1.7;}
.mc-body strong{color:rgba(226,168,55,.55);font-weight:400;}

/* ── FEATURES ── */
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.feat{background:var(--ink2);border:1px solid var(--ink4);padding:24px;}
.feat-label{font-size:8px;letter-spacing:1px;color:rgba(0,212,196,.55);text-transform:uppercase;margin-bottom:10px;}
.feat-title{font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:#fff;margin-bottom:8px;letter-spacing:-.2px;}
.feat-body{font-family:'Inter',sans-serif;font-size:13px;color:rgba(232,237,242,.55);line-height:1.65;}

/* ── COMPLIANCE TABLE ── */
.comp-table{width:100%;border-collapse:collapse;}
.comp-table th{font-size:8px;letter-spacing:.5px;color:rgba(0,212,196,.4);text-transform:uppercase;text-align:left;padding:8px 14px;border-bottom:1px solid rgba(0,160,144,.15);}
.comp-table td{font-family:'Inter',sans-serif;font-size:11px;padding:9px 14px;border-bottom:1px solid var(--ink3);color:rgba(232,237,242,.52);}
.comp-table tr:hover td{background:var(--ink2);}
.ck{color:var(--pass);}
.cx{color:var(--ink4);}

/* ── LOGO LOCKUPS ── */
.lockup-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;border-radius:8px;overflow:hidden;}
.lk-cell{padding:44px;display:flex;align-items:center;justify-content:center;}
.lk-h{display:flex;align-items:center;gap:18px;overflow:visible;padding-bottom:14px;}
.lk-sep{width:1px;height:52px;}
.lk-sep-dk{background:rgba(226,168,55,.1);}
.lk-sep-lt{background:rgba(120,90,10,.2);}
.bg-ink   {background:#08080E;}
.bg-teal  {background:#002A25;}
.bg-mid   {background:#c1c1c1;}
.bg-white {background:#ffffff;}

/* ── ICON-AS-A ── */
.wm-a{display:flex;align-items:flex-end;overflow:visible;padding-bottom:16px;line-height:1;}

/* ── APP ICONS ── */
.icon-row{display:flex;align-items:flex-end;justify-content:center;gap:24px;flex-wrap:wrap;}
.ico-item{display:flex;flex-direction:column;align-items:center;gap:10px;}
.ico-sz{font-size:8px;color:rgba(226,168,55,.2);letter-spacing:.3px;}
.app-ico{border-radius:22%;background:linear-gradient(145deg,#130E01,#060401);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(226,168,55,.1);}

/* ── PRICING ── */
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:680px;margin:0 auto;}
.price-card{border-radius:8px;padding:32px;border:1px solid var(--ink4);background:var(--ink2);}
.price-gold{border-color:rgba(226,168,55,.18);background:rgba(226,168,55,.03);}
.price-tier{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2px;text-transform:uppercase;margin-bottom:8px;}
.price-amt{font-family:'Inter',sans-serif;font-weight:700;font-size:44px;letter-spacing:-.5px;line-height:1;margin-bottom:6px;}
.price-amt-free{background:linear-gradient(180deg,#F5D060,#E2A837 45%,#B8820E 85%,#8A5F08);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.price-sub{font-family:'Inter',sans-serif;font-size:12px;color:rgba(232,237,242,.35);margin-bottom:24px;}
.price-features{font-family:'Inter',sans-serif;font-size:13px;color:rgba(232,237,242,.55);line-height:1.9;list-style:none;}
.price-features li{padding-left:14px;position:relative;}
.price-features li::before{content:'—';position:absolute;left:0;color:rgba(226,168,55,.2);}
.price-cta{display:block;text-align:center;margin-top:22px;padding:10px;border-radius:3px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2px;text-decoration:none;}
.price-cta-ce{background:var(--ink3);border:1px solid var(--ink4);color:rgba(232,237,242,.35);}
.price-cta-ee{background:linear-gradient(135deg,var(--g500),var(--g700));color:#08080E;}

/* ── FOOTER ── */
footer{padding:72px 28px 40px;border-top:1px solid var(--ink4);text-align:center;}
.ft-name{font-family:'Syne',sans-serif;font-weight:800;font-size:56px;letter-spacing:0;background:linear-gradient(180deg,var(--g400),var(--g700));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:.18;margin-bottom:16px;}
.ft-tagline{font-size:9px;color:rgba(226,168,55,.2);letter-spacing:2px;text-transform:uppercase;line-height:2.2;}
.ft-links{display:flex;gap:20px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.ft-link{font-size:9px;color:rgba(0,212,196,.4);text-decoration:none;letter-spacing:.5px;}
.ft-link:hover{color:var(--t300);}


  .meaning-grid{grid-template-columns:1fr;}
  .lockup-grid{grid-template-columns:1fr;}
  .price-grid{grid-template-columns:1fr;}
  nav .nav-links{display:none;}
}

@keyframes lh-flash{0%{opacity:.4;}8%{opacity:1;}18%{opacity:.25;}28%{opacity:1;}38%{opacity:.25;}48%{opacity:1;}65%{opacity:.25;}100%{opacity:.4;}}
@keyframes lh-halo{0%,100%{opacity:.06;}8%,28%,48%{opacity:.24;}18%,38%{opacity:.03;}}
@keyframes compass-rot{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes ghost-draw{0%{stroke-dashoffset:268;opacity:0;}12%{opacity:.15;}72%{opacity:.08;stroke-dashoffset:0;}88%{opacity:0;stroke-dashoffset:0;}100%{stroke-dashoffset:268;opacity:0;}}

/* Teal app icon box */
.icon-box{
  width:200px;height:200px;
  background:linear-gradient(145deg,#003D35,#001F1A);
  border-radius:44px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 20px 60px rgba(0,160,144,.25), 0 4px 16px rgba(0,0,0,.4);
  border:1px solid rgba(0,160,144,.2);
  position:relative;
  margin:0 auto 32px;
}
.icon-box::before{
  content:'';position:absolute;inset:0;border-radius:44px;
  background:linear-gradient(145deg,rgba(0,160,144,.08),transparent 60%);
  pointer-events:none;
}
.wm-shadow{filter:drop-shadow(0 1px 4px rgba(0,0,0,.3));}

/* ── MOBILE NAV (≤768px) ── */
.nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:8px;margin-right:-4px;background:none;border:none;z-index:110;min-width:44px;min-height:44px;align-items:center;}
.nav-burger span{display:block;width:22px;height:2px;background:rgba(0,212,196,.7);border-radius:2px;transition:transform .25s,opacity .25s;transform-origin:center;}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-burger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.nav-drawer{position:fixed;top:50px;left:0;right:0;background:rgba(8,8,14,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,160,144,.2);max-height:0;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1);z-index:99;}
.nav-drawer.open{max-height:340px;}
.nav-drawer-inner{padding:8px 0 20px;}
.nav-drawer a{display:flex;align-items:center;padding:14px 28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,212,196,.55);text-decoration:none;border-left:2px solid transparent;transition:all .15s;min-height:44px;}
.nav-drawer a:hover,.nav-drawer a.active{color:#00D4C4;border-left-color:#00D4C4;background:rgba(0,160,144,.06);}
.nav-drawer .drawer-gh{margin:8px 24px 0;display:flex;align-items:center;justify-content:center;padding:12px;border:1px solid rgba(0,160,144,.3);border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:#00D4C4;text-decoration:none;min-height:44px;}
@media(max-width:768px){.nav-links{display:none!important;}.nav-gh{display:none!important;}.nav-burger{display:flex!important;}}
@media(max-width:768px){.feat-grid{grid-template-columns:1fr;}.meaning-grid{grid-template-columns:1fr;}.lockup-grid{grid-template-columns:1fr;}.price-grid{grid-template-columns:1fr;}.hero{padding:90px 20px 60px;}.hero-stats{gap:20px;}.stat-num{font-size:22px;}}
<script>
(function(){
  var b=document.querySelector('.nav-burger');
  var d=document.querySelector('.nav-drawer');
  if(!b||!d)return;
  b.addEventListener('click',function(e){e.stopPropagation();var o=b.classList.toggle('open');d.classList.toggle('open',o);});
  d.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){b.classList.remove('open');d.classList.remove('open');});});
  document.addEventListener('click',function(e){if(!b.contains(e.target)&&!d.contains(e.target)){b.classList.remove('open');d.classList.remove('open');}});
})();
</script>
</body>
</html>
