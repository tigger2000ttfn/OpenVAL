# ============================================================
# OpenVAL Nginx Configuration
# /etc/nginx/sites-available/openval
# ============================================================
# Tested on Nginx 1.24+ (Ubuntu 22.04 / RHEL 9)
# Copy to /etc/nginx/sites-available/openval
# Run: sudo ln -sf /etc/nginx/sites-available/openval /etc/nginx/sites-enabled/openval
# Run: sudo nginx -t && sudo systemctl reload nginx

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name OPENVAL_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name OPENVAL_DOMAIN;

    # ── TLS ──────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/OPENVAL_DOMAIN.crt;
    ssl_certificate_key /etc/ssl/private/OPENVAL_DOMAIN.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/openval/access.log;
    error_log  /var/log/openval/error.log warn;

    # ── Upload Size Limit ────────────────────────────────────
    # Must match MAX_UPLOAD_SIZE_MB in .env (add 5MB buffer)
    client_max_body_size 55M;
    client_body_timeout  60s;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml application/atom+xml image/svg+xml;

    # ── Frontend Static Files ────────────────────────────────
    root /opt/openval/src/frontend/dist;
    index index.html;

    # Cache static assets aggressively (Vite adds content hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html (React router entry point)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── API Reverse Proxy ────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Media File Serving ───────────────────────────────────
    # Files are served via API auth check, then X-Accel-Redirect here
    location /media/ {
        internal;
        alias /opt/openval/media/;
        expires 1h;
        add_header Cache-Control "private";
    }

    # ── Health Check (unauthenticated, for load balancer) ───
    location = /health {
        proxy_pass http://127.0.0.1:8000/api/v1/health;
        proxy_read_timeout 5s;
        access_log off;
    }

    # ── React Router (SPA fallback) ──────────────────────────
    # All non-file, non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block sensitive paths ────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
